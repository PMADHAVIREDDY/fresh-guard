name: fresh_guard
description: Fruit Freshness Detection App
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  tflite_flutter: ^0.12.0
  image_picker: ^1.0.4
  image: ^4.1.3
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/food_model.tflite
    - assets/labels.txt
    - assets/icon/